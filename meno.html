<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>جستجوی مودها</title>

<style>
body{
    font-family:tahoma;
    text-align:center;
    margin:0;
    padding:15px;
}

h1{
    margin-bottom:20px;
}

input{
    width:90%;
    max-width:500px;
    padding:15px;
    font-size:18px;
    border-radius:10px;
    border:1px solid #ccc;
    margin-bottom:20px;
}

.item{
    margin-bottom:5vh;
}

.item img{
    width:100%;
    height:40vw;
    min-height:200px;
    object-fit:cover;
    border-radius:20px;
    box-shadow:0 0 10px rgba(0,0,0,0.15);
}

.hide{
    display:none;
}
</style>

</head>
<body>

<h1>🔍 جستجوی مودها</h1>

<input type="text" id="search" placeholder="اسم مود را وارد کن...">

<div class="item" data-name="بیکینی باتم">
    <a href="mod1.html">
        <img src="mod1.png">
    </a>
</div>

<div class="item" data-name="سونیک">
    <a href="mod2.html">
        <img src="mod2.png">
    </a>
</div>

<div class="item" data-name="ماشین">
    <a href="mod3.html">
        <img src="mod3.png">
    </a>
</div>

<div class="item" data-name="باب اسفنجی">
    <a href="mod4.html">
        <img src="mod4.png">
    </a>
</div>

<script>
const search = document.getElementById("search");
const items = document.querySelectorAll(".item");

search.addEventListener("input", function(){
    let value = this.value.toLowerCase();

    items.forEach(item => {
        let name = item.getAttribute("data-name");

        if(name.toLowerCase().includes(value)){
            item.style.display = "block";
        }else{
            item.style.display = "none";
        }
    });
});
</script>

</body>
</html>
