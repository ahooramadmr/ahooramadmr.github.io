<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>دانلود مودهای ماینکرفت</title>

<style>
body{
    font-family:tahoma;
    text-align:center;
    margin:0;
    padding:15px;
    background:#f5f5f5;
}

h1{
    margin-bottom:20px;
}

input{
    width:90%;
    max-width:500px;
    padding:15px;
    font-size:18px;
    border-radius:10px;
    border:1px solid #ccc;
    margin-bottom:20px;
}

.mods{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:25px;
}

.item img{
    width:100%;
    height:40vw;
    min-height:200px;
    object-fit:cover;
    border-radius:20px;
    display:block;
    box-shadow:0 0 10px rgba(0,0,0,.15);
}

.item a{
    text-decoration:none;
}
</style>
</head>

<body>

<h1>🔍 جستجوی مودها</h1>

<input type="text" id="search" placeholder="اسم مود را وارد کن...">

<div class="mods">

<div class="item" data-id="1" data-name="بیکینی باتم">
    <a href="mod1.html">
        <img src="mod1.png" alt="بیکینی باتم">
    </a>
</div>

<div class="item" data-id="2" data-name="سونیک">
    <a href="mod2.html">
        <img src="mod2.png" alt="سونیک">
    </a>
</div>

<div class="item" data-id="3" data-name="ماشین">
    <a href="mod3.html">
        <img src="mod3.png" alt="ماشین">
    </a>
</div>

<div class="item" data-id="4" data-name="باب اسفنجی">
    <a href="mod4.html">
        <img src="mod4.png" alt="باب اسفنجی">
    </a>
</div>

<div class="item" data-id="5" data-name="لاک پشت های نینجا">
    <a href="mod5.html">
        <img src="mod5.png" alt="لاک پشت های نینجا">
    </a>
</div>

</div>

<script>
const mods = document.querySelector(".mods");

// مرتب کردن مودها (جدیدترین اول)
const items = [...document.querySelectorAll(".item")];

items
.sort((a,b)=>Number(b.dataset.id)-Number(a.dataset.id))
.forEach(item=>mods.appendChild(item));

// جستجو
const search = document.getElementById("search");

search.addEventListener("input",function(){

    const value=this.value.trim().toLowerCase();

    document.querySelectorAll(".item").forEach(item=>{

        const name=item.dataset.name.toLowerCase();

        item.style.display=
            name.includes(value) ? "" : "none";

    });

});
</script>

</body>
</html>
